<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ETR Training Admin</title><link rel="stylesheet" href="style.css"></head><body class="admin-page"><header class="topbar"><div class="brand"><span class="logo">ETR</span><div><strong>Training Administration</strong><small>Completion records</small></div></div><button id="adminSignOut" class="ghost-btn">Sign out</button></header><main class="admin-main"><section id="adminLogin" class="admin-card"><h1>Administrator sign in</h1><label>Email<input id="adminEmail" type="email"></label><label>Password<input id="adminPassword" type="password"></label><button id="adminLoginBtn" class="primary-btn">Sign in</button><p id="adminMessage" role="status"></p></section><section id="adminDashboard" hidden><div class="admin-head"><div><span class="eyebrow">LIVE TRAINING RECORDS</span><h1>Employee completion dashboard</h1></div><button id="exportBtn" class="primary-btn">Export CSV</button></div><div class="stats"><div><strong id="totalStat">0</strong><span>Employees</span></div><div><strong id="completeStat">0</strong><span>Completed</span></div><div><strong id="progressStat">0</strong><span>In progress</span></div><div><strong id="scoreStat">0%</strong><span>Average score</span></div></div><div class="table-wrap"><table><thead><tr><th>Employee</th><th>Email</th><th>Modules</th><th>Exam</th><th>Status</th><th>Last updated</th><th>Certificate</th></tr></thead><tbody id="recordsBody"></tbody></table></div></section></main><script src="firebase-config.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script><script src="admin.js"></script></body></html>
